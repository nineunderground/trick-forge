apiVersion: trickforge/v1
kind: GameProfile
metadata:
  id: odin
  name: Odin
  version: "1.0"
  description: >
    Climbing card game. Empty your hand as fast as possible; each card left
    at the end of a hand is worth 1 point. Lowest score wins.
  authors:
    - Helvetiq
  tags:
    - climbing
    - ladder
spec:
  family: climbing
  players:
    min: 3
    max: 5
    default: 4
  deck:
    suits:
      - red
      - blue
      - green
      - yellow
      - purple
      - orange
    ranks: [1, 2, 3, 4, 5, 6, 7, 8, 9]
    copies: 1
  deal:
    cardsPerPlayer: 9
  scoring:
    mode: penalty
    pointsPerRemainingCard: 1
    gameEndThreshold: 15
    winner: lowest
  rules:
    climbing:
      openingPlay: single_card
      beatConstraint:
        sameCountOrPlusOne: true
        setMustBeSameSuitOrSameRank: true
        valueFromDigitsHighToLow: true
      onBeatPrevious:
        takeOneCardFromPreviousSet: true
      pass:
        allowed: true
        canReenterSameRound: true
      roundEnd:
        onEmptyHand: true
        onAllPass:
          discardLastSet: true
          leaderPlaysSingleOrHandBomb: true
      handBomb:
        allCardsSameSuitOrRank: true
